<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Money</title>
  <style>
    :root {
      --bg: #FAF7F2; --card: #FFFFFF; --text: #2D2A26; --muted: #8C8578;
      --border: #E8E2D8; --border-dark: #D4CEC4;
      --gold: #A67C00; --gold-l: #C49B1A; --gold-bg: #FFF8E7;
      --teal: #0D7C72; --teal-bg: #E6F7F5;
      --green: #16803C; --green-bg: #ECFDF5;
      --red: #C42B2B; --red-bg: #FEF2F2;
      --purple: #6D28D9; --purple-bg: #F3EEFF;
      --blue: #1D5CBF; --blue-bg: #EFF6FF;
      --orange: #C2590A;
      --chart-0: #A67C00; --chart-1: #0D7C72; --chart-2: #6D28D9; --chart-3: #C2590A;
      --chart-4: #C42B2B; --chart-5: #1D5CBF; --chart-6: #16803C; --chart-7: #9F5CC0;
      --chart-8: #B45B1A; --chart-9: #2D8C84; --chart-10: #8B6914; --chart-11: #5B21B6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    button, input, select { font: inherit; }
    .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
    .app { min-height: 100vh; }
    header {
      position: sticky; top: 0; z-index: 50; background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 32px;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 36px; height: 36px; border-radius: 10px; background: var(--gold); color: white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; }
    .brand-title { font-size: 18px; font-weight: 700; }
    .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    main { padding: 24px 32px 100px; max-width: 1440px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .row { display: flex; gap: 12px; }
    .space-between { display: flex; justify-content: space-between; align-items: center; }
    .hidden { display: none !important; }
    .csv-card { margin-bottom: 20px; padding: 16px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .csv-left { display:flex; align-items:center; gap:14px; }
    .csv-icon { width: 42px; height: 42px; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .btn {
      padding: 8px 16px; border-radius: 7px; cursor: pointer; border: 1px solid var(--border);
      background: white; color: var(--text);
    }
    .btn-primary { border: none; color: white; background: var(--gold); font-weight: 600; }
    .btn-outline { background: transparent; }
    .btn-save { padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 600; }
    .badge { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
    .sig-card { padding: 14px 16px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); }
    .sig-label { font-size: 9.5px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
    .sig-value { font-size: 22px; font-weight: 700; }
    .sig-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .progress { margin-top: 6px; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .progress > div { height: 100%; }
    .pillar-btn { padding: 14px 16px; border-radius: 10px; cursor: pointer; text-align:left; background: var(--card); border: 1.5px solid var(--border); }
    .pillar-btn .label { font-size: 10px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
    .pillar-btn .value { font-size: 20px; font-weight: 700; }
    .pillar-btn .sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .panel { margin-bottom: 20px; padding: 16px 20px; }
    .panel-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .section { margin-bottom: 24px; }
    .section-top { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; gap:12px; flex-wrap:wrap; }
    .section-title-wrap { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .metric-chip { background: var(--bg); border-radius: 6px; padding: 6px 12px; display:flex; flex-direction:column; }
    .metric-chip .l { font-size: 9px; color: var(--muted); }
    .metric-chip .v { font-size: 14px; font-weight: 700; }
    .section-body { border-radius: 10px; overflow: hidden; background: var(--card); border: 1px solid var(--border); }
    .table-wrap { overflow-x:auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; white-space: nowrap; }
    td.numeric, th.numeric { text-align: right; }
    td strong { font-weight: 700; }
    .chip-select { font-size: 11px; border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; cursor:pointer; }
    .delete-btn { border:none; background:none; color: var(--red); font-size: 18px; cursor:pointer; opacity:.5; }
    .edit-inline {
      cursor: pointer; border-bottom: 1px dashed var(--border); padding-bottom: 1px; display:inline-block;
    }
    .edit-input {
      padding: 2px 6px; font-size: 12px; font-family: "SF Mono", Menlo, Consolas, monospace;
      border: 1.5px solid var(--gold); border-radius: 4px; background: var(--gold-bg); color: var(--text);
      outline: none;
    }
    .exp-layout { display:grid; grid-template-columns: 1fr 260px; gap: 20px; }
    .chart-card { padding: 16px 20px; }
    .bar-chart { height: 280px; display:flex; align-items:flex-end; gap: 10px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 8px 24px 10px; position: relative; }
    .bar-col { flex: 1; min-width: 0; display:flex; align-items:flex-end; justify-content:center; position:relative; }
    .stack { width: 100%; max-width: 54px; display:flex; flex-direction:column; justify-content:flex-end; border-radius: 3px 3px 0 0; overflow:hidden; min-height: 2px; }
    .stack-seg { width: 100%; }
    .bar-label { position:absolute; bottom: -22px; font-size: 10px; color: var(--muted); white-space: nowrap; }
    .legend-item { display:flex; justify-content:space-between; padding: 5px 0; border-bottom: 1px solid var(--border); gap: 10px; }
    .legend-left { display:flex; align-items:center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 2px; }
    .income-grid { display:grid; grid-template-columns: 160px 1fr; gap:20px; }
    .donut-wrap { width: 160px; height: 160px; display:flex; align-items:center; justify-content:center; }
    .goal-row { margin-bottom: 10px; }
    .goal-head { display:flex; justify-content:space-between; margin-bottom:3px; gap:10px; }
    .goal-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow:hidden; }
    .goal-bar > div { height:100%; background: var(--teal); border-radius:3px; }
    @media (max-width: 1200px) { .grid-5 { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 900px) {
      main { padding: 20px 16px 80px; }
      header { padding: 0 16px; }
      .csv-card, .section-top, .header-inner { flex-direction: column; align-items: stretch; height: auto; padding: 12px 0; }
      .exp-layout, .income-grid { grid-template-columns: 1fr; }
      .grid-5 { grid-template-columns: 1fr; }
      .csv-left { align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-inner">
        <div class="brand">
          <div class="brand-mark">$</div>
          <div>
            <div class="brand-title">My Money</div>
            <div class="brand-sub mono">Household Financial Dashboard</div>
          </div>
        </div>
        <div class="row" style="align-items:center; justify-content:flex-end;">
          <div id="signalBadge"></div>
          <button id="saveBtn" class="btn btn-save mono">Save Session</button>
        </div>
      </div>
    </header>

    <main>
      <div id="csvCard" class="card csv-card">
        <div class="csv-left">
          <div id="csvIcon" class="csv-icon"></div>
          <div>
            <div id="csvTitle" style="font-size:14px; font-weight:600;"></div>
            <div id="csvSub" style="font-size:12px; color:var(--muted);"></div>
          </div>
        </div>
        <div class="row" style="justify-content:flex-end;">
          <button id="clearCsvBtn" class="btn btn-outline mono hidden">Clear</button>
          <button id="chooseFileBtn" class="btn btn-primary mono"></button>
        </div>
        <input id="fileInput" type="file" accept=".csv" class="hidden" />
      </div>

      <div id="signalCards" class="grid-5" style="margin-bottom:20px;"></div>
      <div id="pillarCards" class="grid-5" style="margin-bottom:20px;"></div>
      <div id="expandedPanel"></div>
      <div id="defaultExpChart"></div>
      <div id="sections"></div>
    </main>
  </div>

  <script>
    const T = {
      bg: "#FAF7F2", card: "#FFFFFF", text: "#2D2A26", muted: "#8C8578",
      border: "#E8E2D8", borderDark: "#D4CEC4",
      gold: "#A67C00", goldL: "#C49B1A", goldBg: "#FFF8E7",
      teal: "#0D7C72", tealBg: "#E6F7F5",
      green: "#16803C", greenBg: "#ECFDF5",
      red: "#C42B2B", redBg: "#FEF2F2",
      purple: "#6D28D9", purpleBg: "#F3EEFF",
      blue: "#1D5CBF", blueBg: "#EFF6FF",
      orange: "#C2590A",
      chart: ["#A67C00","#0D7C72","#6D28D9","#C2590A","#C42B2B","#1D5CBF","#16803C","#9F5CC0","#B45B1A","#2D8C84","#8B6914","#5B21B6"],
    };

    const DEF_INCOME = [
      { id: 1, name: "Partner 1 Salary", type: "salary", grossAnnual: 185000, netMonthly: 11200 },
      { id: 2, name: "Partner 2 Salary", type: "salary", grossAnnual: 145000, netMonthly: 9100 },
      { id: 3, name: "IP1 Brunswick Rent", type: "rental", grossAnnual: 28800, netMonthly: 2400 },
      { id: 4, name: "IP2 Geelong Rent", type: "rental", grossAnnual: 25200, netMonthly: 2100 },
      { id: 5, name: "ETF Dividends", type: "investment", grossAnnual: 4800, netMonthly: 400 },
    ];
    const DEF_PROPS = [
      { id: 1, name: "Family Home, Ivanhoe", type: "PPOR", value: 1450000, mortgage: 520000, rate: 5.89, weeklyRent: 0, occupancy: 0, annualExpenses: 12000, growth: 4.2 },
      { id: 2, name: "IP1 Brunswick", type: "Investment", value: 780000, mortgage: 480000, rate: 6.19, weeklyRent: 600, occupancy: 95, annualExpenses: 8400, growth: 5.1 },
      { id: 3, name: "IP2 Geelong", type: "Investment", value: 620000, mortgage: 390000, rate: 6.39, weeklyRent: 525, occupancy: 92, annualExpenses: 7200, growth: 6.8 },
    ];
    const DEF_ETFS = [
      { id: 1, ticker: "VAS", name: "Vanguard AU Shares", units: 1200, avgPrice: 82.5, currentPrice: 94.2, allocation: 35 },
      { id: 2, ticker: "VGS", name: "Vanguard Intl Shares", units: 800, avgPrice: 95, currentPrice: 112.8, allocation: 28 },
      { id: 3, ticker: "NDQ", name: "BetaShares NASDAQ 100", units: 250, avgPrice: 32, currentPrice: 42.5, allocation: 12 },
      { id: 4, ticker: "VGE", name: "Vanguard Emerging Mkts", units: 400, avgPrice: 68, currentPrice: 72.4, allocation: 9 },
      { id: 5, ticker: "VAF", name: "Vanguard AU Fixed Int", units: 600, avgPrice: 48.5, currentPrice: 46.8, allocation: 9 },
      { id: 6, ticker: "VHY", name: "Vanguard High Yield", units: 350, avgPrice: 58, currentPrice: 64.2, allocation: 7 },
    ];
    const DEF_SUPER = [
      { id: 1, name: "Partner 1", fund: "SMSF", balance: 285000, salaryIncSuper: 185000, sgRate: 11.5, salarySacrifice: 12000, nonConcessional: 0, insurancePremium: 1200 },
      { id: 2, name: "Partner 2", fund: "SMSF", balance: 195000, salaryIncSuper: 145000, sgRate: 11.5, salarySacrifice: 8000, nonConcessional: 0, insurancePremium: 950 },
    ];
    const DEF_SAVINGS = { emergencyCurrent: 52000, offsetBalance: 38000, cashReserve: 7000,
      goals: [{ name: "Emergency Fund", target: 75000, current: 52000 }, { name: "Holiday Fund", target: 8000, current: 3200 }, { name: "Car Replacement", target: 45000, current: 18500 }] };

    const state = {
      properties: structuredClone(DEF_PROPS),
      etfs: structuredClone(DEF_ETFS),
      superMembers: structuredClone(DEF_SUPER),
      income: structuredClone(DEF_INCOME),
      savings: structuredClone(DEF_SAVINGS),
      transactions: [],
      csvStatus: 'idle',
      csvName: null,
      csvCount: 0,
      saveStatus: 'idle',
      expandedPillar: null,
      loaded: true,
    };

    const fmt = (v) => new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
    const fmtK = (v) => { if (v >= 1e6) return "$" + (v / 1e6).toFixed(v >= 1e7 ? 1 : 2) + "M"; if (v >= 1000) return "$" + (v / 1000).toFixed(0) + "k"; return fmt(v); };
    const pctF = (v) => (v > 0 ? "+" : "") + Number(v).toFixed(1) + "%";

    function storageGet(key, fallback) {
      try { const raw = localStorage.getItem('mymoney-' + key); return raw ? JSON.parse(raw) : fallback; }
      catch { return fallback; }
    }
    function storageSet(key, data) {
      try {
        if (data === null) localStorage.removeItem('mymoney-' + key);
        else localStorage.setItem('mymoney-' + key, JSON.stringify(data));
        return true;
      } catch { return false; }
    }

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      const headers = lines[0].toLowerCase().split(",").map(h => h.trim().replace(/"/g, ""));
      const dI = headers.findIndex(h => /date/.test(h));
      const descI = headers.findIndex(h => /desc|narr|memo|particular|detail|reference/.test(h));
      const amtI = headers.findIndex(h => /^amount$/.test(h));
      const debI = headers.findIndex(h => /debit/.test(h));
      const creI = headers.findIndex(h => /credit/.test(h));
      const catI = headers.findIndex(h => /cat|category/.test(h));
      const txns = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = lines[i].match(/(".*?"|[^,]+)/g);
        if (!vals || vals.length < 2) continue;
        const cl = vals.map(v => v.trim().replace(/^"|"$/g, ""));
        const desc = descI >= 0 ? cl[descI] : (cl[1] || "");
        let amount = 0;
        if (amtI >= 0) amount = parseFloat((cl[amtI] || "0").replace(/[^0-9.\-]/g, "")) || 0;
        else {
          const d = debI >= 0 ? Math.abs(parseFloat((cl[debI] || "0").replace(/[^0-9.\-]/g, "")) || 0) : 0;
          const c = creI >= 0 ? parseFloat((cl[creI] || "0").replace(/[^0-9.\-]/g, "")) || 0 : 0;
          amount = c > 0 ? c : -d;
        }
        let date = null;
        if (dI >= 0 && cl[dI]) {
          const p = cl[dI].split(/[/\-]/);
          if (p.length === 3) {
            const n = p.map(Number);
            date = n[0] > 31 ? new Date(n[0], n[1] - 1, n[2]) : new Date(n[2] < 100 ? 2000 + n[2] : n[2], n[1] - 1, n[0]);
          }
        }
        txns.push({ date, description: desc, amount, category: catI >= 0 ? cl[catI] : cat(desc), isIncome: amount > 0 });
      }
      return txns;
    }

    function cat(d) {
      const l = (d || '').toLowerCase();
      if (/coles|woolworth|aldi|iga|grocer/.test(l)) return "Groceries";
      if (/uber eat|menulog|doordash|mcdonald|cafe|coffee|restaurant|dining|pizza|sushi/.test(l)) return "Dining Out";
      if (/netflix|spotify|disney|apple|google play|subscription|stan/.test(l)) return "Subscriptions";
      if (/petrol|fuel|bp |shell|uber|taxi|parking|rego|toll|myki|ptv/.test(l)) return "Transport";
      if (/electric|gas|water|internet|telstra|optus|energy|agl|origin/.test(l)) return "Utilities";
      if (/medibank|bupa|doctor|pharmacy|dental|physio|health/.test(l)) return "Healthcare";
      if (/insurance|allianz|suncorp|racv/.test(l)) return "Insurance";
      if (/school|tuition|childcare|education/.test(l)) return "Education";
      if (/mortgage|home loan|rent|body corp|strata|council/.test(l)) return "Housing";
      if (/target|kmart|bigw|jb hi|bunning|clothing/.test(l)) return "Shopping";
      if (/gym|sport|fitness|ticket|cinema|concert/.test(l)) return "Entertainment";
      if (/transfer|pay|salary|wage|income|dividend/.test(l)) return "Transfer/Income";
      return "Other";
    }

    function calcMetrics(txns, props, income, etfs, superMembers, savings) {
      const totalIncome = income.reduce((s, i) => s + i.netMonthly, 0);
      const totalSavings = savings.emergencyCurrent + savings.offsetBalance + savings.cashReserve;
      const propEquity = props.reduce((s, p) => s + (p.value - p.mortgage), 0);
      const propValue = props.reduce((s, p) => s + p.value, 0);
      const propDebt = props.reduce((s, p) => s + p.mortgage, 0);
      const etfVal = etfs.reduce((s, h) => s + h.units * h.currentPrice, 0);
      const etfCost = etfs.reduce((s, h) => s + h.units * h.avgPrice, 0);
      const superTotal = superMembers.reduce((s, m) => s + m.balance, 0);
      const expTxns = txns.filter(t => !t.isIncome && t.category !== "Transfer/Income");
      const totalExp = expTxns.reduce((s, t) => s + Math.abs(t.amount), 0);
      const monthSet = new Set(expTxns.map(t => t.date ? (t.date.getFullYear() + "-" + t.date.getMonth()) : "x"));
      const months = Math.max(monthSet.size, 1);
      const avgExp = totalExp / months;
      const byCat = {};
      expTxns.forEach(t => { byCat[t.category] = (byCat[t.category] || 0) + Math.abs(t.amount); });
      const catList = Object.entries(byCat).map(([n, tot]) => ({ name: n, total: tot, monthly: tot / months })).sort((a, b) => b.total - a.total);
      const byMo = {};
      expTxns.forEach(t => {
        if (!t.date) return;
        const k = t.date.getFullYear() + "-" + String(t.date.getMonth() + 1).padStart(2, "0");
        const l = t.date.toLocaleDateString("en-AU", { month: "short", year: "2-digit" });
        if (!byMo[k]) byMo[k] = { key: k, label: l, total: 0, cats: {} };
        byMo[k].total += Math.abs(t.amount);
        byMo[k].cats[t.category] = (byMo[k].cats[t.category] || 0) + Math.abs(t.amount);
      });
      const moData = Object.values(byMo).sort((a, b) => a.key.localeCompare(b.key));
      const topCats = catList.slice(0, 6).map(c => c.name);
      const stacked = moData.map(md => {
        const row = { month: md.label, total: Math.round(md.total) };
        topCats.forEach(c => { row[c] = Math.round(md.cats[c] || 0); });
        row.Other = Math.round(Object.entries(md.cats).filter(([k]) => !topCats.includes(k)).reduce((s, e) => s + e[1], 0));
        return row;
      });
      const hasCSV = txns.length > 0;
      const exp = hasCSV ? avgExp : 14375;
      const surplus = totalIncome - exp;
      const savRate = totalIncome > 0 ? (surplus / totalIncome * 100) : 0;
      const eMo = savings.emergencyCurrent / exp;
      const drift = hasCSV && moData.length >= 2 ? ((moData[moData.length - 1].total - moData[moData.length - 2].total) / (moData[moData.length - 2].total || 1) * 100) : 3.2;
      const capReady = Math.min(100, Math.round((savRate > 20 ? 40 : savRate * 2) + (Math.abs(drift) < 5 ? 30 : Math.abs(drift) < 10 ? 20 : 10) + (eMo > 6 ? 30 : (eMo / 6) * 30)));
      const signal = capReady >= 70 && Math.abs(drift) < 5 && savRate > 15 ? "Lean In" : capReady < 40 || Math.abs(drift) > 20 || savRate < 5 ? "Stand Down" : "Prepare";
      const netWorth = propEquity + etfVal + totalSavings + superTotal;
      return { totalIncome, totalExpenses: exp, surplus, savingsRate: savRate, expenseDrift: drift, propertyEquity: propEquity, totalPropertyValue: propValue, totalMortgage: propDebt, etfValue: etfVal, etfCost, superTotal, totalSavings, emergencyMonths: eMo, capitalReadiness: capReady, signal, netWorth, hasCSV, categoryList: catList, stackedMonthly: stacked, monthlyData: moData, topCats, txnCount: txns.length, avgMonthlyExpense: avgExp };
    }

    function loadState() {
      state.properties = storageGet('properties', structuredClone(DEF_PROPS));
      state.etfs = storageGet('etfs', structuredClone(DEF_ETFS));
      state.superMembers = storageGet('super', structuredClone(DEF_SUPER));
      const c = storageGet('csv', null);
      if (c && c.txns) {
        state.transactions = c.txns.map(t => ({ ...t, date: t.date ? new Date(t.date) : null }));
        state.csvName = c.name;
        state.csvCount = c.txns.length;
        state.csvStatus = 'done';
      }
    }

    function saveSession() {
      state.saveStatus = 'saving';
      renderHeader();
      storageSet('properties', state.properties);
      storageSet('etfs', state.etfs);
      storageSet('super', state.superMembers);
      state.saveStatus = 'saved';
      renderHeader();
      setTimeout(() => {
        state.saveStatus = 'idle';
        renderHeader();
      }, 2000);
    }

    function render() {
      const m = calcMetrics(state.transactions, state.properties, state.income, state.etfs, state.superMembers, state.savings);
      renderHeader(m);
      renderCsvCard();
      renderSignalCards(m);
      renderPillarCards(m);
      renderExpanded(m);
      renderSections(m);
    }

    function renderHeader(m = calcMetrics(state.transactions, state.properties, state.income, state.etfs, state.superMembers, state.savings)) {
      const signalBadge = document.getElementById('signalBadge');
      const map = { "Lean In": { bg: T.greenBg, b: T.green, t: T.green }, "Prepare": { bg: T.goldBg, b: T.orange, t: T.orange }, "Stand Down": { bg: T.redBg, b: T.red, t: T.red } };
      const s = map[m.signal];
      signalBadge.innerHTML = `<span class="badge mono" style="background:${s.bg}; border:1.5px solid ${s.b}; color:${s.t};">${m.signal}</span>`;
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.textContent = state.saveStatus === 'saving' ? 'Saving...' : state.saveStatus === 'saved' ? '✓ Saved' : 'Save Session';
      saveBtn.style.border = `1.5px solid ${state.saveStatus === 'saved' ? T.green : T.gold}`;
      saveBtn.style.background = state.saveStatus === 'saved' ? T.greenBg : T.goldBg;
      saveBtn.style.color = state.saveStatus === 'saved' ? T.green : T.gold;
    }

    function renderCsvCard() {
      const card = document.getElementById('csvCard');
      const icon = document.getElementById('csvIcon');
      const title = document.getElementById('csvTitle');
      const sub = document.getElementById('csvSub');
      const clearBtn = document.getElementById('clearCsvBtn');
      const chooseBtn = document.getElementById('chooseFileBtn');

      if (state.csvStatus === 'done') {
        card.style.border = `1.5px solid ${T.green}`;
        icon.style.background = T.greenBg; icon.style.color = T.green; icon.textContent = '✓';
        title.textContent = 'CSV Loaded';
        sub.textContent = `${state.csvName} • ${state.csvCount.toLocaleString()} transactions imported`;
        clearBtn.classList.remove('hidden');
        chooseBtn.style.background = T.green; chooseBtn.textContent = 'Replace CSV';
      } else if (state.csvStatus === 'loading') {
        card.style.border = `1.5px solid ${T.border}`;
        icon.style.background = T.blueBg; icon.style.color = T.blue; icon.textContent = '↑';
        title.textContent = 'Processing...';
        sub.textContent = 'Parsing and categorising transactions...';
        clearBtn.classList.add('hidden');
        chooseBtn.style.background = T.gold; chooseBtn.textContent = 'Processing...';
      } else {
        card.style.border = `1.5px solid ${T.border}`;
        icon.style.background = T.blueBg; icon.style.color = T.blue; icon.textContent = '↑';
        title.textContent = 'Upload Bank CSV';
        sub.textContent = 'Import transactions to see expense breakdown. Supports most AU bank formats.';
        clearBtn.classList.add('hidden');
        chooseBtn.style.background = T.gold; chooseBtn.textContent = 'Choose File';
      }
    }

    function sigCardHTML({ label, value, sub, color, progress }) {
      return `<div class="sig-card"><div class="sig-label mono">${label}</div><div class="sig-value mono" style="color:${color};">${value}</div>${progress !== undefined ? `<div class="progress"><div style="width:${progress}%; background:${color};"></div></div>` : ''}<div class="sig-sub">${sub}</div></div>`;
    }

    function renderSignalCards(m) {
      document.getElementById('signalCards').innerHTML = [
        { label: 'Net Monthly Surplus', value: fmt(m.surplus), sub: 'Run-rate', color: m.surplus >= 0 ? T.green : T.red },
        { label: 'Expense Drift', value: pctF(m.expenseDrift), sub: m.hasCSV ? 'vs prior month' : 'estimated', color: Math.abs(m.expenseDrift) > 5 ? T.red : Math.abs(m.expenseDrift) > 2 ? T.orange : T.green },
        { label: 'Savings Rate', value: m.savingsRate.toFixed(1) + '%', sub: m.savingsRate > 20 ? 'Strong' : m.savingsRate > 10 ? 'Healthy' : 'Low', color: m.savingsRate > 20 ? T.green : m.savingsRate > 10 ? T.orange : T.red },
        { label: 'Capital Readiness', value: String(m.capitalReadiness), sub: '/100 composite', color: T.teal, progress: m.capitalReadiness },
        { label: 'Total Net Worth', value: fmtK(m.netWorth), sub: 'All pillars', color: T.gold },
      ].map(sigCardHTML).join('');
    }

    function renderPillarCards(m) {
      const items = [
        { id: 'income', label: 'Income', val: fmt(m.totalIncome), sub: '/month net', color: T.green, bg: T.greenBg },
        { id: 'expenses', label: 'Expenses', val: m.hasCSV ? fmt(m.avgMonthlyExpense) : 'No CSV', sub: m.hasCSV ? `${m.txnCount} transactions` : 'Upload above', color: T.red, bg: T.redBg, dim: !m.hasCSV },
        { id: 'savings', label: 'Savings', val: fmtK(m.totalSavings), sub: `${m.emergencyMonths.toFixed(1)} months cover`, color: T.teal, bg: T.tealBg },
        { id: 'investments', label: 'Investments', val: fmtK(m.propertyEquity + m.etfValue), sub: 'Property + Shares', color: T.gold, bg: T.goldBg },
        { id: 'super', label: 'Super', val: fmtK(m.superTotal), sub: `${state.superMembers.length} members`, color: T.purple, bg: T.purpleBg },
      ];
      document.getElementById('pillarCards').innerHTML = items.map(p => `
        <button class="pillar-btn" data-pill="${p.id}" style="background:${state.expandedPillar === p.id ? p.bg : T.card}; border-color:${state.expandedPillar === p.id ? p.color : T.border};">
          <div class="label mono">${p.label}</div>
          <div class="value" style="color:${p.dim ? T.muted : T.text};">${p.val}</div>
          <div class="sub">${p.sub}</div>
        </button>
      `).join('');
      document.querySelectorAll('[data-pill]').forEach(btn => btn.onclick = () => {
        const id = btn.dataset.pill;
        state.expandedPillar = state.expandedPillar === id ? null : id;
        render();
      });
    }

    function renderExpanded(m) {
      const expanded = document.getElementById('expandedPanel');
      const defChart = document.getElementById('defaultExpChart');
      expanded.innerHTML = '';
      defChart.innerHTML = '';

      if (state.expandedPillar === 'income') expanded.innerHTML = incomePanelHTML(m);
      if (state.expandedPillar === 'expenses' && m.hasCSV) expanded.innerHTML = expChartHTML(m);
      if (state.expandedPillar === 'savings') expanded.innerHTML = savingsPanelHTML(m);
      if (!state.expandedPillar && m.hasCSV) defChart.innerHTML = expChartHTML(m);

      renderDonuts();
      bindInlineEdits();
    }

    function renderSections(m) {
      const sections = document.getElementById('sections');
      sections.innerHTML = propertySectionHTML(m) + sharesSectionHTML(m) + superSectionHTML(m);
      bindSectionEvents();
      bindInlineEdits();
    }

    function sectionShell(title, color, metrics, addLabel, addId, body) {
      return `<div class="section"><div class="section-top"><div class="section-title-wrap"><div style="font-size:18px; font-weight:700; color:${color};">${title}</div>${metrics.map(m => `<div class="metric-chip"><span class="l mono">${m.l}</span><span class="v mono" style="color:${m.c};">${m.v}</span></div>`).join('')}</div>${addId ? `<button class="btn btn-outline mono" data-action="${addId}" style="border:1.5px solid ${color}; color:${color};">${addLabel}</button>` : ''}</div><div class="section-body">${body}</div></div>`;
    }

    function propertySectionHTML(m) {
      const rows = state.properties.map(p => {
        const eq = p.value - p.mortgage; const lvr = p.value > 0 ? (p.mortgage / p.value * 100) : 0;
        const moRent = p.weeklyRent * 52 * (p.occupancy / 100) / 12;
        const moInt = p.mortgage * (p.rate / 100) / 12;
        const moCost = p.annualExpenses / 12;
        const cf = p.type !== 'PPOR' ? moRent - moCost - moInt : -(moCost + moInt);
        return `<tr>
          <td><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="name" data-type="text">${escapeHtml(p.name)}</span></td>
          <td class="numeric"><select class="chip-select" data-entity="property" data-id="${p.id}" data-field="type" style="background:${p.type === 'PPOR' ? T.purpleBg : T.tealBg}; color:${p.type === 'PPOR' ? T.purple : T.teal};"><option value="PPOR" ${p.type === 'PPOR' ? 'selected' : ''}>PPOR</option><option value="Investment" ${p.type === 'Investment' ? 'selected' : ''}>Investment</option></select></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="value" data-type="money">${fmt(p.value)}</span></td>
          <td class="numeric mono" style="color:${T.red};"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="mortgage" data-type="money">${fmt(p.mortgage)}</span></td>
          <td class="numeric mono" style="color:${T.teal}; font-weight:600;">${fmtK(eq)}</td>
          <td class="numeric mono" style="color:${lvr > 80 ? T.red : lvr > 60 ? T.orange : T.green};">${lvr.toFixed(0)}%</td>
          <td class="numeric mono"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="rate" data-type="pct">${p.rate}%</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="weeklyRent" data-type="money">${fmt(p.weeklyRent)}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="occupancy" data-type="pct">${p.occupancy}%</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="annualExpenses" data-type="money">${fmt(p.annualExpenses)}</span></td>
          <td class="numeric mono" style="font-weight:600; color:${cf >= 0 ? T.green : T.red};">${cf >= 0 ? '+' : ''}${fmt(Math.round(cf))}</td>
          <td class="numeric mono" style="color:${T.green};"><span class="edit-inline" data-entity="property" data-id="${p.id}" data-field="growth" data-type="pct">${p.growth}%</span></td>
          <td class="numeric"><button class="delete-btn" data-action="delete-property" data-id="${p.id}">&times;</button></td>
        </tr>`;
      }).join('');
      return sectionShell('Property Portfolio', T.gold, [
        { l: 'Total Value', v: fmtK(m.totalPropertyValue), c: T.gold },
        { l: 'Total Equity', v: fmtK(m.propertyEquity), c: T.teal },
        { l: 'Total Debt', v: fmtK(m.totalMortgage), c: T.red },
        { l: 'LVR', v: (m.totalMortgage / m.totalPropertyValue * 100).toFixed(0) + '%', c: T.muted },
      ], '+ Add Property', 'add-property', `<div class="table-wrap"><table><thead><tr>${['Property','Type','Value','Mortgage','Equity','LVR','Rate','Rent /wk','Occupancy','Annual Costs','Monthly CF','Growth',''].map((h,i)=>`<th class="${i===0?'':'numeric'} mono" style="color:${T.gold}; border-bottom:2px solid ${T.gold}30;">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`);
    }

    function sharesSectionHTML(m) {
      const rows = state.etfs.map((h, idx) => {
        const v = h.units * h.currentPrice; const cost = h.units * h.avgPrice; const ret = v - cost; const rp = cost > 0 ? (ret / cost * 100) : 0;
        return `<tr>
          <td><div style="display:flex; align-items:center; gap:6px;"><div class="dot" style="background:${T.chart[idx % T.chart.length]}; width:6px; height:6px;"></div><span class="edit-inline" data-entity="etf" data-id="${h.id}" data-field="ticker" data-type="text" style="font-weight:700;">${escapeHtml(h.ticker)}</span></div></td>
          <td style="color:${T.muted};"><span class="edit-inline" data-entity="etf" data-id="${h.id}" data-field="name" data-type="text">${escapeHtml(h.name)}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="etf" data-id="${h.id}" data-field="units" data-type="number">${Number(h.units).toLocaleString()}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="etf" data-id="${h.id}" data-field="avgPrice" data-type="number">${h.avgPrice}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="etf" data-id="${h.id}" data-field="currentPrice" data-type="number">${h.currentPrice}</span></td>
          <td class="numeric mono" style="font-weight:600;">${fmtK(v)}</td>
          <td class="numeric mono" style="color:${ret >= 0 ? T.green : T.red};">${ret >= 0 ? '+' : ''}${fmtK(ret)}</td>
          <td class="numeric mono" style="font-weight:600; color:${rp >= 0 ? T.green : T.red};">${rp >= 0 ? '+' : ''}${rp.toFixed(1)}%</td>
          <td class="numeric mono"><span class="edit-inline" data-entity="etf" data-id="${h.id}" data-field="allocation" data-type="pct">${h.allocation}%</span></td>
          <td class="numeric"><button class="delete-btn" data-action="delete-etf" data-id="${h.id}">&times;</button></td>
        </tr>`;
      }).join('');
      return sectionShell('Shares Portfolio', T.teal, [
        { l: 'Value', v: fmtK(m.etfValue), c: T.teal },
        { l: 'Return', v: fmtK(m.etfValue - m.etfCost), c: T.green },
        { l: 'Return %', v: '+' + ((m.etfValue - m.etfCost) / (m.etfCost || 1) * 100).toFixed(1) + '%', c: T.green },
      ], '+ Add Holding', 'add-etf', `<div class="table-wrap"><table><thead><tr>${['Ticker','Name','Units','Avg Price','Current','Value','Return $','Return %','Allocation',''].map((h,i)=>`<th class="${i<2?'':'numeric'} mono" style="color:${T.teal}; border-bottom:2px solid ${T.teal}30;">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`);
    }

    function superSectionHTML(m) {
      const rows = state.superMembers.map(s => {
        const sg = s.salaryIncSuper * (s.sgRate / 100) / (1 + s.sgRate / 100);
        const totalContrib = sg + s.salarySacrifice + s.nonConcessional;
        return `<tr>
          <td><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="name" data-type="text" style="font-weight:600;">${escapeHtml(s.name)}</span></td>
          <td><select class="chip-select" data-entity="super" data-id="${s.id}" data-field="fund" style="background:${T.purpleBg}; color:${T.purple};"><option value="SMSF" ${s.fund==='SMSF'?'selected':''}>SMSF</option><option value="Industry" ${s.fund==='Industry'?'selected':''}>Industry</option><option value="Retail" ${s.fund==='Retail'?'selected':''}>Retail</option></select></td>
          <td class="numeric mono" style="font-weight:600; color:${T.purple};"><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="balance" data-type="money">${fmt(s.balance)}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="salaryIncSuper" data-type="money">${fmt(s.salaryIncSuper)}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="sgRate" data-type="pct">${s.sgRate}%</span></td>
          <td class="numeric mono" style="color:${T.green};">${fmtK(Math.round(sg))}/yr</td>
          <td class="numeric mono" style="color:${T.teal};"><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="salarySacrifice" data-type="money">${fmt(s.salarySacrifice)}</span></td>
          <td class="numeric mono"><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="nonConcessional" data-type="money">${fmt(s.nonConcessional)}</span></td>
          <td class="numeric mono" style="color:${T.red};"><span class="edit-inline" data-entity="super" data-id="${s.id}" data-field="insurancePremium" data-type="money">${fmt(s.insurancePremium)}</span></td>
          <td class="numeric mono" style="font-weight:600; color:${T.green};">${fmtK(Math.round(totalContrib))}/yr</td>
          <td class="numeric"><button class="delete-btn" data-action="delete-super" data-id="${s.id}">&times;</button></td>
        </tr>`;
      }).join('');
      return sectionShell('Superannuation', T.purple, [
        { l: 'Total Balance', v: fmtK(m.superTotal), c: T.purple },
        { l: 'Members', v: String(state.superMembers.length), c: T.muted },
      ], '+ Add Member', 'add-super', `<div class="table-wrap"><table><thead><tr>${['Member','Fund','Balance','Salary (inc. super)','SG Rate','Employer SG','Salary Sacrifice','Non-Concessional','Insurance','Total Contributions',''].map((h,i)=>`<th class="${i<2?'':'numeric'} mono" style="color:${T.purple}; border-bottom:2px solid ${T.purple}30;">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`);
    }

    function expChartHTML(m) {
      const keys = [...m.topCats, 'Other'];
      const max = Math.max(...m.stackedMonthly.map(d => d.total), 1);
      return `<div class="card chart-card"><div class="panel-title">Monthly Expenditure</div><div class="exp-layout"><div class="bar-chart">${m.stackedMonthly.map(row => {
        const parts = keys.map((k, i) => {
          const val = row[k] || 0;
          const h = row.total ? (val / max * 240) : 0;
          return `<div class="stack-seg" style="height:${h}px; background:${T.chart[i % T.chart.length]};"></div>`;
        }).join('');
        return `<div class="bar-col"><div class="stack">${parts}</div><div class="bar-label mono">${row.month}</div></div>`;
      }).join('')}</div><div><div class="mono" style="font-size:10px; color:${T.muted}; margin-bottom:8px;">CATEGORY BREAKDOWN</div>${m.categoryList.slice(0,10).map((c,i)=>`<div class="legend-item"><div class="legend-left"><div class="dot" style="background:${T.chart[i % T.chart.length]};"></div><span style="font-size:12px;">${escapeHtml(c.name)}</span></div><span class="mono" style="font-size:12px; font-weight:600;">${fmt(Math.round(c.monthly))}/mo</span></div>`).join('')}<div style="display:flex; justify-content:space-between; padding:8px 0; margin-top:4px; border-top:2px solid ${T.border};"><span style="font-weight:600; color:${T.gold};">Total avg</span><span class="mono" style="font-size:14px; font-weight:700; color:${T.red};">${fmt(Math.round(m.avgMonthlyExpense))}/mo</span></div></div></div></div>`;
    }

    function incomePanelHTML(m) {
      const byType = {};
      state.income.forEach(s => { byType[s.type] = (byType[s.type] || 0) + s.netMonthly; });
      const pie = Object.entries(byType).map(([n, v]) => ({ name: n.charAt(0).toUpperCase() + n.slice(1), value: v }));
      return `<div class="card panel"><div class="panel-title">Income Breakdown</div><div class="income-grid"><div class="donut-wrap"><svg id="incomeDonut" width="160" height="160" viewBox="0 0 160 160" data-pie='${JSON.stringify(pie).replace(/'/g, '&apos;')}'></svg></div><div>${state.income.map(s=>`<div style="display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid ${T.border}; gap:10px;"><div><div style="font-size:13px; font-weight:500;">${escapeHtml(s.name)}</div><div class="mono" style="font-size:10px; color:${T.muted};">${s.type}</div></div><div style="text-align:right;"><div class="mono" style="font-size:14px; font-weight:600; color:${T.green};">${fmt(s.netMonthly)}</div><div style="font-size:10px; color:${T.muted};">${fmt(s.grossAnnual)} p.a.</div></div></div>`).join('')}<div style="display:flex; justify-content:space-between; padding:8px 0;"><span style="font-weight:600; color:${T.gold};">Total monthly net</span><span class="mono" style="font-size:16px; font-weight:700; color:${T.green};">${fmt(m.totalIncome)}</span></div></div></div></div>`;
    }

    function savingsPanelHTML(m) {
      const blocks = [
        { l: 'Emergency Fund', v: fmtK(state.savings.emergencyCurrent), s: `${m.emergencyMonths.toFixed(1)} months`, c: m.emergencyMonths >= 6 ? T.green : T.orange },
        { l: 'Offset Account', v: fmtK(state.savings.offsetBalance), s: 'Reducing PPOR interest', c: T.teal },
        { l: 'Cash Reserve', v: fmtK(state.savings.cashReserve), s: 'Deployable', c: T.gold },
      ];
      return `<div class="card panel"><div class="panel-title">Savings and Reserves</div><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px;">${blocks.map(x=>`<div style="background:${T.bg}; border-radius:8px; padding:10px 14px;"><div class="mono" style="font-size:9px; color:${T.muted}; margin-bottom:3px;">${x.l}</div><div class="mono" style="font-size:16px; font-weight:700; color:${x.c};">${x.v}</div><div style="font-size:10px; color:${T.muted}; margin-top:2px;">${x.s}</div></div>`).join('')}</div><div class="mono" style="font-size:10px; color:${T.gold}; font-weight:600; margin-bottom:8px;">GOALS</div>${state.savings.goals.map(g=>{ const done = g.current / g.target * 100; return `<div class="goal-row"><div class="goal-head"><span style="font-size:12.5px; font-weight:500;">${escapeHtml(g.name)}</span><span class="mono" style="font-size:11px; color:${T.muted};">${fmtK(g.current)} / ${fmtK(g.target)}</span></div><div class="goal-bar"><div style="width:${done}%;"></div></div></div>`; }).join('')}</div>`;
    }

    function bindSectionEvents() {
      document.querySelectorAll('[data-action="add-property"]').forEach(btn => btn.onclick = () => {
        state.properties.push({ id: Date.now(), name: 'New Property', type: 'Investment', value: 0, mortgage: 0, rate: 6.0, weeklyRent: 0, occupancy: 95, annualExpenses: 0, growth: 5 });
        render();
      });
      document.querySelectorAll('[data-action="add-etf"]').forEach(btn => btn.onclick = () => {
        state.etfs.push({ id: Date.now(), ticker: 'NEW', name: 'New Holding', units: 0, avgPrice: 0, currentPrice: 0, allocation: 0 });
        render();
      });
      document.querySelectorAll('[data-action="add-super"]').forEach(btn => btn.onclick = () => {
        state.superMembers.push({ id: Date.now(), name: 'New Member', fund: 'Industry', balance: 0, salaryIncSuper: 0, sgRate: 11.5, salarySacrifice: 0, nonConcessional: 0, insurancePremium: 0 });
        render();
      });
      document.querySelectorAll('[data-action="delete-property"]').forEach(btn => btn.onclick = () => { state.properties = state.properties.filter(p => p.id !== Number(btn.dataset.id)); render(); });
      document.querySelectorAll('[data-action="delete-etf"]').forEach(btn => btn.onclick = () => { state.etfs = state.etfs.filter(e => e.id !== Number(btn.dataset.id)); render(); });
      document.querySelectorAll('[data-action="delete-super"]').forEach(btn => btn.onclick = () => { state.superMembers = state.superMembers.filter(s => s.id !== Number(btn.dataset.id)); render(); });
      document.querySelectorAll('select[data-entity]').forEach(sel => sel.onchange = () => updateEntityField(sel.dataset.entity, Number(sel.dataset.id), sel.dataset.field, sel.value));
    }

    function bindInlineEdits() {
      document.querySelectorAll('.edit-inline').forEach(el => {
        el.onclick = () => startEdit(el);
      });
    }

    function startEdit(el) {
      if (el.dataset.editing === '1') return;
      el.dataset.editing = '1';
      const type = el.dataset.type;
      const entity = el.dataset.entity;
      const id = Number(el.dataset.id);
      const field = el.dataset.field;
      const current = getEntityField(entity, id, field);
      const input = document.createElement('input');
      input.className = 'edit-input';
      input.value = current;
      input.style.width = type === 'text' ? '140px' : '90px';
      input.style.textAlign = type === 'text' ? 'left' : 'right';
      el.replaceWith(input);
      input.focus();
      input.select();

      const commit = () => {
        let value = input.value;
        if (type !== 'text') value = parseFloat(value) || 0;
        updateEntityField(entity, id, field, value);
      };
      input.addEventListener('blur', commit, { once: true });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') commit();
        if (e.key === 'Escape') render();
      });
    }

    function getEntityField(entity, id, field) {
      const list = entity === 'property' ? state.properties : entity === 'etf' ? state.etfs : state.superMembers;
      const item = list.find(x => x.id === id);
      return item ? item[field] : '';
    }

    function updateEntityField(entity, id, field, value) {
      const list = entity === 'property' ? state.properties : entity === 'etf' ? state.etfs : state.superMembers;
      const idx = list.findIndex(x => x.id === id);
      if (idx >= 0) list[idx][field] = value;
      render();
    }

    function renderDonuts() {
      const svg = document.getElementById('incomeDonut');
      if (!svg) return;
      const pie = JSON.parse(svg.dataset.pie || '[]');
      const total = pie.reduce((s, p) => s + p.value, 0) || 1;
      const r = 45, cx = 80, cy = 80, stroke = 24;
      let acc = -Math.PI / 2;
      const parts = pie.map((p, i) => {
        const ang = p.value / total * Math.PI * 2;
        const x1 = cx + r * Math.cos(acc), y1 = cy + r * Math.sin(acc);
        const x2 = cx + r * Math.cos(acc + ang), y2 = cy + r * Math.sin(acc + ang);
        const large = ang > Math.PI ? 1 : 0;
        const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
        acc += ang;
        return `<path d="${d}" fill="none" stroke="${T.chart[i % T.chart.length]}" stroke-width="${stroke}" stroke-linecap="butt" />`;
      }).join('');
      svg.innerHTML = `<circle cx="80" cy="80" r="45" fill="none" stroke="${T.border}" stroke-width="24"></circle>${parts}<text x="80" y="76" text-anchor="middle" style="font-size:10px; fill:${T.muted}; font-family:monospace;">TOTAL</text><text x="80" y="92" text-anchor="middle" style="font-size:14px; font-weight:700; fill:${T.text}; font-family:monospace;">${fmt(total)}</text>`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }

    document.getElementById('chooseFileBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      state.csvStatus = 'loading';
      state.csvName = f.name;
      renderCsvCard();
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const parsed = parseCSV(ev.target.result);
        state.transactions = parsed;
        state.csvCount = parsed.length;
        state.csvStatus = 'done';
        storageSet('csv', { name: f.name, txns: parsed });
        render();
      };
      reader.readAsText(f);
      e.target.value = '';
    };
    document.getElementById('clearCsvBtn').onclick = () => {
      state.transactions = [];
      state.csvStatus = 'idle';
      state.csvName = null;
      state.csvCount = 0;
      storageSet('csv', null);
      render();
    };
    document.getElementById('saveBtn').onclick = saveSession;

    loadState();
    render();
  </script>
</body>
</html>
